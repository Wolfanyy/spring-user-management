<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Create User</title>

    <link rel="stylesheet"
          th:href="@{/css/style.css}">

</head>

<body>

<div class="form-page">

    <div class="form-card">

        <h1>Create User</h1>

        <form th:action="@{/users}"
              th:object="${user}"
              method="post">

            <input type="text"
                   th:field="*{name}"
                   placeholder="Name">

            <div class="error-message"
                 th:if="${#fields.hasErrors('name')}"
                 th:errors="*{name}">
            </div>

            <input type="text"
                   th:field="*{lastName}"
                   placeholder="Last Name">

            <div class="error-message"
                 th:if="${#fields.hasErrors('lastName')}"
                 th:errors="*{lastName}">
            </div>

            <input type="email"
                   th:field="*{email}"
                   placeholder="Email">

            <div class="error-message"
                 th:if="${#fields.hasErrors('email')}"
                 th:errors="*{email}">
            </div>

            <input type="number"
                   th:field="*{age}"
                   placeholder="Age"
                   min="1"
                   max="100">

            <div class="error-message"
                 th:if="${#fields.hasErrors('age')}"
                 th:errors="*{age}">
            </div>

            <button class="btn btn-primary"
                    type="submit">
                Save User
            </button>

        </form>

        <a class="back-link"
           th:href="@{/users}">
            ← Back to users
        </a>

    </div>

</div>

</body>

</html>
